<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小白的混沌空间(๑❛ᴗ❛๑) </title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --text:#1f2430;
      --muted:#667085;
      --line:#e7eaf0;
      --accent:#ff8fb1;
      --accent-2:#ffc0cb;
      --shadow:0 10px 30px rgba(39,45,77,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#f8f8ff 0%,#f4f5fb 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:32px 18px 60px;
    }
    .hero{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:white;
      border-radius:28px;
      padding:28px 22px;
      box-shadow:var(--shadow);
    }
    .hero h1{
      margin:0 0 8px 0;
      font-size:30px;
      line-height:1.2;
    }
    .hero p{
      margin:0;
      opacity:.95;
      line-height:1.7;
    }
    .toolbar{
      margin-top:18px;
      display:grid;
      grid-template-columns:1.3fr .8fr auto auto;
      gap:12px;
    }
    input, select, textarea, button{
      font:inherit;
    }
    .input, .select, .textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:14px;
      padding:14px 16px;
      outline:none;
      transition:.2s border,.2s box-shadow;
    }
    .input:focus,.select:focus,.textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(108,99,255,.12);
    }
    .btn{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      cursor:pointer;
      background:var(--accent);
      color:white;
      font-weight:600;
      box-shadow:var(--shadow);
      transition:transform .06s ease, opacity .2s ease;
    }
    .btn:hover{opacity:.96}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:none;
    }
    .section{
      margin-top:22px;
      display:grid;
      grid-template-columns:1.3fr .8fr;
      gap:20px;
    }
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .panel-header{
      padding:18px 18px 10px;
      border-bottom:1px solid var(--line);
    }
    .panel-header h2{
      margin:0;
      font-size:18px;
    }
    .panel-body{
      padding:16px 18px 18px;
    }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }
    .chip{
      border:1px solid var(--line);
      background:#fafaff;
      color:#475467;
      border-radius:999px;
      padding:9px 13px;
      cursor:pointer;
      user-select:none;
      transition:.2s;
    }
    .chip.active{
      background:rgba(108,99,255,.11);
      border-color:rgba(108,99,255,.28);
      color:#4d43ff;
      font-weight:600;
    }
    .count{
      color:var(--muted);
      font-size:14px;
      margin-bottom:10px;
    }
    .results{
      display:grid;
      gap:12px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      background:#fff;
      transition:.2s transform,.2s box-shadow,.2s border;
      cursor:pointer;
    }
    .card:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(39,45,77,.06);
      border-color:#d7dbeb;
    }
    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .tag{
      font-size:12px;
      padding:5px 9px;
      border-radius:999px;
      background:#f3f4f8;
      color:#4b5565;
    }
    .card h3{
      margin:0 0 8px 0;
      font-size:18px;
    }
    .card p{
      margin:0;
      color:#4b5565;
      line-height:1.7;
      white-space:pre-wrap;
    }
    .muted{
      color:var(--muted);
    }
    .detail-title{
      margin:0 0 10px 0;
      font-size:22px;
    }
    .detail-content{
      white-space:pre-wrap;
      line-height:1.8;
      color:#374151;
    }
    .small{
      font-size:13px;
      color:var(--muted);
    }
    .form-grid{
      display:grid;
      gap:12px;
    }
    .empty{
      padding:18px;
      border:1px dashed var(--line);
      border-radius:14px;
      color:var(--muted);
      text-align:center;
      background:#fcfcff;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .footer{
      margin-top:20px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }
    @media (max-width:900px){
      .toolbar,.section{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>小白的混沌空间(๑❛ᴗ❛๑)</h1>
      <p>这里是小白独家搜索引擎꒰՞´●᷄.𖥦●᷄`՞꒱ 输入关键词，就能找到你想要的内容咯！</p>
    </div>

    <div class="toolbar">
      <input id="searchInput" class="input" type="text" placeholder="搜索关键词，比如：法语、食谱、邮件格式、影视推荐.." />
      <select id="categorySelect" class="select">
        <option value="全部">全部分类</option>
      </select>
      <button id="addSampleBtn" class="btn secondary">恢复示例内容</button>
      <button id="newBtn" class="btn">新增内容</button>
    </div>

    <div class="section">
      <div class="panel">
        <div class="panel-header">
          <h2>搜索结果</h2>
        </div>
        <div class="panel-body">
          <div id="chips" class="chips"></div>
          <div id="count" class="count"></div>
          <div id="results" class="results"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 id="sideTitle">详情</h2>
        </div>
        <div class="panel-body">
          <div id="detailView">
            <div class="empty">点左边一条内容，就会在这里显示详细内容喔。</div>
          </div>

          <div id="editor" style="display:none;">
            <div class="form-grid">
              <input id="titleInput" class="input" type="text" placeholder="标题" />
              <input id="categoryInput" class="input" type="text" placeholder="分类，比如：法语 / EAP / 数学 / 生活" />
              <input id="keywordsInput" class="input" type="text" placeholder="关键词，用逗号分开，比如：成都, presentation, 法语" />
              <textarea id="contentInput" class="textarea" rows="10" placeholder="内容"></textarea>
            </div>
            <div class="actions">
              <button id="saveBtn" class="btn">保存</button>
              <button id="cancelBtn" class="btn secondary">取消</button>
            </div>
            <div class="small" style="margin-top:10px;">保存后会自动存在浏览器里，本地打开也能继续用！</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">单文件网站 · 可直接本地打开使用</div>
  </div>

  <script>
    const STORAGE_KEY = "guaiguai-search-site-v1";
    const SAMPLE_ITEMS = [
      {
        id: crypto.randomUUID(),
        title: "成都 presentation 法语开头",
        category: "法语",
        keywords: ["成都", "presentation", "法语", "A1"],
        content: "Aujourd’hui, je présente Chengdu.\nChengdu est dans le sud-ouest de la Chine.\nC’est la capitale du Sichuan."
      },
      {
        id: crypto.randomUUID(),
        title: "B2B essay 结构",
        category: "EAP",
        keywords: ["B2B", "essay", "structure", "marketing"],
        content: "1. Introduction\n2. Difference\n3. Why\n4. Advantage\n5. However: disadvantage\n6. It depends: balanced judgement\n7. Conclusion"
      },
      {
        id: crypto.randomUUID(),
        title: "z test 基本步骤",
        category: "数学",
        keywords: ["z test", "statistics", "hypothesis"],
        content: "1. 写 H0 和 H1\n2. 选显著性水平\n3. 算 test statistic\n4. 找 critical value / p-value\n5. 比较并写 conclusion"
      },
      {
        id: crypto.randomUUID(),
        title: "给老师发邮件模板",
        category: "邮件",
        keywords: ["email", "老师", "模板"],
        content: "Dear [Name],\nI hope you are well.\nI am writing to ask...\nThank you for your time.\nBest regards,\n[Your Name]"
      }
    ];

    let items = loadItems();
    let currentCategory = "全部";
    let editingId = null;

    const searchInput = document.getElementById("searchInput");
    const categorySelect = document.getElementById("categorySelect");
    const chips = document.getElementById("chips");
    const count = document.getElementById("count");
    const results = document.getElementById("results");
    const detailView = document.getElementById("detailView");
    const editor = document.getElementById("editor");
    const sideTitle = document.getElementById("sideTitle");

    const titleInput = document.getElementById("titleInput");
    const categoryInput = document.getElementById("categoryInput");
    const keywordsInput = document.getElementById("keywordsInput");
    const contentInput = document.getElementById("contentInput");

    function loadItems(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(SAMPLE_ITEMS));
        return [...SAMPLE_ITEMS];
      }
      try{
        return JSON.parse(raw);
      }catch{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(SAMPLE_ITEMS));
        return [...SAMPLE_ITEMS];
      }
    }

    function saveItems(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function getCategories(){
      return ["全部", ...new Set(items.map(i => i.category).filter(Boolean))];
    }

    function updateCategoryUI(){
      const categories = getCategories();

      categorySelect.innerHTML = categories
        .map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c === "全部" ? "全部分类" : c)}</option>`)
        .join("");
      categorySelect.value = currentCategory;

      chips.innerHTML = categories.map(c => `
        <button class="chip ${c === currentCategory ? "active" : ""}" data-category="${escapeAttr(c)}">${escapeHtml(c)}</button>
      `).join("");

      chips.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          currentCategory = btn.dataset.category;
          categorySelect.value = currentCategory;
          render();
        });
      });
    }

    function normalize(text){
      return (text || "").toLowerCase().trim();
    }

    function filterItems(){
      const q = normalize(searchInput.value);
      return items.filter(item => {
        const inCategory = currentCategory === "全部" || item.category === currentCategory;
        if(!inCategory) return false;
        if(!q) return true;
        const hay = [
          item.title,
          item.category,
          item.content,
          ...(item.keywords || [])
        ].join(" ").toLowerCase();
        return hay.includes(q);
      });
    }

    function render(){
      updateCategoryUI();
      const filtered = filterItems();
      count.textContent = `共 ${filtered.length} 条内容`;
      results.innerHTML = "";

      if(!filtered.length){
        results.innerHTML = `<div class="empty">没有搜到结果诶..试试换个关键词，或者新增一条内容呀。</div>`;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="meta">
            <span class="tag">${escapeHtml(item.category || "未分类")}</span>
            ${(item.keywords || []).slice(0,4).map(k => `<span class="tag">${escapeHtml(k)}</span>`).join("")}
          </div>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(getPreview(item.content, 100))}</p>
        `;
        card.addEventListener("click", () => showDetail(item.id));
        results.appendChild(card);
      });
    }

    function showDetail(id){
      const item = items.find(x => x.id === id);
      if(!item) return;
      editor.style.display = "none";
      detailView.style.display = "block";
      sideTitle.textContent = "详情";
      detailView.innerHTML = `
        <div class="meta" style="margin-bottom:12px;">
          <span class="tag">${escapeHtml(item.category || "未分类")}</span>
          ${(item.keywords || []).map(k => `<span class="tag">${escapeHtml(k)}</span>`).join("")}
        </div>
        <h3 class="detail-title">${escapeHtml(item.title)}</h3>
        <div class="detail-content">${escapeHtml(item.content)}</div>
        <div class="actions">
          <button class="btn" id="editThisBtn">编辑</button>
          <button class="btn secondary" id="deleteThisBtn">删除</button>
        </div>
      `;
      document.getElementById("editThisBtn").addEventListener("click", () => openEditor(item.id));
      document.getElementById("deleteThisBtn").addEventListener("click", () => deleteItem(item.id));
    }

    function openEditor(id = null){
      editingId = id;
      sideTitle.textContent = id ? "编辑内容" : "新增内容";
      detailView.style.display = "none";
      editor.style.display = "block";

      if(id){
        const item = items.find(x => x.id === id);
        titleInput.value = item?.title || "";
        categoryInput.value = item?.category || "";
        keywordsInput.value = (item?.keywords || []).join(", ");
        contentInput.value = item?.content || "";
      }else{
        titleInput.value = "";
        categoryInput.value = "";
        keywordsInput.value = "";
        contentInput.value = "";
      }
    }

    function deleteItem(id){
      if(!confirm("确定要删除这条内容嘛？")) return;
      items = items.filter(x => x.id !== id);
      saveItems();
      render();
      sideTitle.textContent = "详情";
      detailView.style.display = "block";
      editor.style.display = "none";
      detailView.innerHTML = `<div class="empty">这条内容已经删除咯！</div>`;
    }

    function restoreSample(){
      if(!confirm("会用示例内容覆盖当前内容，确定继续嘛？")) return;
      items = [...SAMPLE_ITEMS];
      saveItems();
      currentCategory = "全部";
      searchInput.value = "";
      render();
      detailView.innerHTML = `<div class="empty">示例内容已恢复。点左边内容查看详情。</div>`;
      detailView.style.display = "block";
      editor.style.display = "none";
      sideTitle.textContent = "详情";
    }

    function saveCurrent(){
      const title = titleInput.value.trim();
      const category = categoryInput.value.trim() || "未分类";
      const keywords = keywordsInput.value.split(",").map(x => x.trim()).filter(Boolean);
      const content = contentInput.value.trim();

      if(!title || !content){
        alert("标题和内容不能空着喔！");
        return;
      }

      if(editingId){
        items = items.map(item => item.id === editingId ? {...item, title, category, keywords, content} : item);
      }else{
        items.unshift({
          id: crypto.randomUUID(),
          title, category, keywords, content
        });
      }

      saveItems();
      render();

      const targetId = editingId || items[0].id;
      editingId = null;
      showDetail(targetId);
    }

    function getPreview(text, max){
      return text.length > max ? text.slice(0, max) + "..." : text;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function escapeAttr(str){
      return escapeHtml(str);
    }

    document.getElementById("newBtn").addEventListener("click", () => openEditor());
    document.getElementById("saveBtn").addEventListener("click", saveCurrent);
    document.getElementById("cancelBtn").addEventListener("click", () => {
      editor.style.display = "none";
      detailView.style.display = "block";
      sideTitle.textContent = "详情";
      if(!detailView.innerHTML.trim()){
        detailView.innerHTML = `<div class="empty">点左边一条内容，就会在这里显示详细内容喔。</div>`;
      }
    });
    document.getElementById("addSampleBtn").addEventListener("click", restoreSample);

    searchInput.addEventListener("input", render);
    categorySelect.addEventListener("change", (e) => {
      currentCategory = e.target.value;
      render();
    });

    render();
  </script>
</body>
</html>
